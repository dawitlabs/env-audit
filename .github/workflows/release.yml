name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build binaries
        run: |
          GOOS=linux   GOARCH=amd64  go build -ldflags="-s -w" -o dist/env-audit-linux-amd64   .
          GOOS=linux   GOARCH=arm64  go build -ldflags="-s -w" -o dist/env-audit-linux-arm64   .
          GOOS=darwin  GOARCH=amd64  go build -ldflags="-s -w" -o dist/env-audit-darwin-amd64  .
          GOOS=darwin  GOARCH=arm64  go build -ldflags="-s -w" -o dist/env-audit-darwin-arm64  .

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
